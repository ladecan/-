<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Email Generator</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 30px;
}

h1 { text-align: center; }

.wrapper {
  display: flex;
  gap: 20px;
  max-width: 1000px;
  margin: auto;
}

.left, .right {
  background: white;
  padding: 20px;
  border-radius: 10px;
  flex: 1;
}

.right {
  max-width: 300px;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
}

.result-box {
  margin-top: 20px;
}

pre {
  background: #1e1e1e;
  color: #00ff88;
  padding: 10px;
  border-radius: 5px;
  white-space: pre-wrap;
  margin-bottom: 10px;
}
</style>

</head>
<body>

<h1>📧 Sales Email Generator</h1>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

<label>Situation</label>
<select id="situation">
  <option value="follow_up">Follow-up</option>
  <option value="first_contact">First Contact</option>
</select>

<label>Tone</label>
<select id="tone">
  <option value="polite">Polite</option>
  <option value="direct">Direct</option>
</select>

<label>Company</label>
<input id="company" placeholder="ABC Company">

<label>Deadline</label>
<input id="deadline" placeholder="April 10">

<button onclick="generateEmail()">Generate</button>

<div id="results"></div>

</div>

<!-- RIGHT -->
<div class="right">

<h3>📦 Product Category</h3>

<select id="category">
  <option value="medical">Medical Device</option>
  <option value="cosmetic">Cosmetic</option>
  <option value="general">General Product</option>
</select>

<label>Product Name</label>
<input id="product" placeholder="Device / Product">

</div>

</div>

<script>
const categoryMap = {
  medical: {
    term: "medical device",
    extra: "approved and compliant with regulations"
  },
  cosmetic: {
    term: "cosmetic product",
    extra: "designed for skin safety and daily use"
  },
  general: {
    term: "product",
    extra: "high-quality and competitive"
  }
};

const templates = {

  follow_up: {
    polite: [
`Dear {company},

I hope you are doing well.

Just following up regarding our {product}.
Please let me know if you had a chance to review.

Looking forward to your feedback.

Best regards,`,

`Dear {company},

I wanted to check in about the {product} we shared.
Any updates would be appreciated.

Best regards,`,

`Dear {company},

Hope everything is going well.

Following up on our previous discussion about {product}.

Best regards,`,

`Dear {company},

Just a gentle follow-up regarding {product}.
Looking forward to hearing from you.

Best regards,`,

`Dear {company},

Checking if you had time to review the {product}.
Your feedback would be appreciated.

Best regards,`
    ],

    direct: [
`Hi {company},

Following up on {product}.
Please share feedback.

Thanks.`,

`Hi {company},

Any update on {product}?

Thanks.`,

`Hi {company},

Checking status on {product}.

Thanks.`,

`Hi {company},

Please confirm feedback on {product}.

Thanks.`,

`Hi {company},

Following up. Let me know your thoughts.

Thanks.`
    ]
  },

  first_contact: {
    polite: [
`Dear {company},

We are pleased to introduce our {product}, a {category_term} that is {category_extra}.

Please let us know if you are interested.

Best regards,`,

`Dear {company},

We would like to present our {product}.
It is a {category_term} known for being {category_extra}.

Best regards,`,

`Dear {company},

Introducing our {product}, which is {category_extra}.

Looking forward to your interest.

Best regards,`,

`Dear {company},

We are reaching out to introduce our {product}.
It is widely recognized as {category_extra}.

Best regards,`,

`Dear {company},

Our {product} is a {category_term} built to be {category_extra}.

Let us know your interest.

Best regards,`
    ],

    direct: [
`Hi {company},

We offer {product}, a {category_term}.
Let me know if interested.

Thanks.`,

`Hi {company},

Sharing our {product}.
It's {category_extra}.

Thanks.`,

`Hi {company},

We supply {product}.
Let me know your thoughts.

Thanks.`,

`Hi {company},

Introducing {product}.
Interested?

Thanks.`,

`Hi {company},

We provide {product}.
Let’s discuss.

Thanks.`
    ]
  }

};

function generateEmail() {
  const situation = document.getElementById("situation").value;
  const tone = document.getElementById("tone").value;
  const company = document.getElementById("company").value || "your company";
  const product = document.getElementById("product").value || "product";

  const category = document.getElementById("category").value;
  const categoryData = categoryMap[category];

  const list = templates[situation][tone];

  let resultsHTML = "";

  for (let i = 0; i < 5; i++) {
    let template = list[i];

    let text = template
      .replace(/{company}/g, company)
      .replace(/{product}/g, product)
      .replace(/{category_term}/g, categoryData.term)
      .replace(/{category_extra}/g, categoryData.extra);

    resultsHTML += `<pre>${text}</pre>`;
  }

  document.getElementById("results").innerHTML = resultsHTML;
}
</script>

</body>
</html>
