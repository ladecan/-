<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Email Generator</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f8;
  padding:40px;
}

.container {
  max-width:700px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
}

button {
  margin-top:15px;
  padding:12px;
  width:100%;
  cursor:pointer;
}

pre {
  background:#111;
  color:#0f0;
  padding:15px;
  margin-top:20px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>📧 AI Sales Email Generator</h2>

<input id="myCompany" placeholder="Your Company">
<input id="clientCompany" placeholder="Client Company">

<textarea id="koreanText" rows="6" placeholder="한국어로 막 써"></textarea>

<button onclick="generate()">Generate Email</button>

<pre id="result"></pre>

</div>

<script>

async function generate(){

  const myCompany = document.getElementById("myCompany").value;
  const clientCompany = document.getElementById("clientCompany").value;
  const koreanText = document.getElementById("koreanText").value;

  const prompt = `
You are a professional international sales manager.

Convert the Korean message into a natural, persuasive business email in English.

- Include subject line
- Make it professional and global
- Improve wording (not literal translation)

Sender: ${myCompany}
Client: ${clientCompany}

Message:
${koreanText}
`;

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer 여기에_니_API키"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    data.choices?.[0]?.message?.content || "Error";
}

</script>

</body>
</html>
