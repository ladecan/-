<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Email Generator</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:30px; }
.wrapper { display:flex; gap:20px; max-width:1100px; margin:auto; }
.left,.right { background:#fff; padding:20px; border-radius:10px; flex:1; }
.right { max-width:320px; }
label { display:block; margin-top:10px; font-weight:bold; }
input,select,textarea { width:100%; padding:8px; margin-top:5px; }
button { margin-top:10px; padding:10px; width:100%; }

.card {
  background:#111;
  color:#0f0;
  padding:15px;
  margin-top:15px;
  border-radius:8px;
}

.copy { background:#28a745; margin-top:10px; }

.ai-box {
  background:#222;
  color:#fff;
  padding:15px;
  margin-top:15px;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>📧 Smart Sales Email Tool</h2>

<div class="wrapper">

<div class="left">

<label>Situation</label>
<select id="situation">
  <option value="first_contact">First Contact</option>
  <option value="follow_up">Follow-up</option>
</select>

<label>Tone</label>
<select id="tone">
  <option value="polite">Polite</option>
  <option value="direct">Direct</option>
</select>

<label>Your Company</label>
<input id="myCompany" placeholder="Your Company Name">

<label>Client Company</label>
<input id="company" placeholder="ABC Company">

<button onclick="generate()">Generate Email</button>

<div id="result"></div>

<hr>

<h3>🧠 AI-style Translator</h3>

<textarea id="koreanInput" placeholder="한국어로 하고 싶은 말 입력"></textarea>
<button onclick="translateKorean()">Convert to Business English</button>

<div id="aiResult"></div>

</div>

<div class="right">

<h3>📦 Product</h3>

<select id="category">
  <option value="medical">Medical Device</option>
  <option value="cosmetic">Cosmetic</option>
  <option value="general">General</option>
</select>

<label>Product Name</label>
<input id="product" placeholder="Product name">

</div>

</div>

<script>

const categoryMap = {
  medical: {
    term: "medical device",
    extra: "clinically validated performance and strict regulatory compliance"
  },
  cosmetic: {
    term: "aesthetic solution",
    extra: "premium quality and proven safety"
  },
  general: {
    term: "innovative product",
    extra: "strong performance and competitive pricing"
  }
};

const templates = {
  first_contact: {
    polite: {
      subject: ["Introducing our {product}", "Partnership opportunity"],
      body: [`Dear {company},

My name is [Your Name] from {myCompany}, a global supplier of {category_term}.

We would like to introduce our {product}, known for its {category_extra}.

We believe this product can bring strong value to your portfolio.

Please let us know if you are interested.

Best regards,`]
    }
  }
};

function generate() {

  const myCompany = document.getElementById("myCompany").value || "our company";
  const company = document.getElementById("company").value || "your company";
  const product = document.getElementById("product").value || "product";

  const category = categoryMap[document.getElementById("category").value];

  let subject = templates.first_contact.polite.subject[0];
  let body = templates.first_contact.polite.body[0];

  let text = ("Subject: "+subject+"\n\n"+body)
    .replace(/{company}/g,company)
    .replace(/{product}/g,product)
    .replace(/{myCompany}/g,myCompany)
    .replace(/{category_term}/g,category.term)
    .replace(/{category_extra}/g,category.extra);

  document.getElementById("result").innerHTML =
    `<div class="card">${text.replace(/\n/g,"<br>")}
    <button class="copy" onclick="copyText(\`${text}\`)">Copy</button></div>`;
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

/* 🔥 AI-like translator (rule-based) */
function translateKorean(){

  const input = document.getElementById("koreanInput").value;

  let output = "";
  let explanation = "";

  if(input.includes("답장")){
    output = "We would appreciate your prompt response.";
    explanation = "‘답장 부탁’ → direct 대신 polite request로 변환";
  }
  else if(input.includes("검토")){
    output = "Please let us know your thoughts after review.";
    explanation = "검토 요청 → 부담 줄이는 soft 표현";
  }
  else if(input.includes("관심")){
    output = "Please let us know if you would be interested.";
    explanation = "관심 여부 → standard business CTA";
  }
  else{
    output = "We would appreciate your feedback regarding this matter.";
    explanation = "일반적인 비즈니스 표현으로 변환";
  }

  document.getElementById("aiResult").innerHTML = `
    <div class="ai-box">
    <b>EN:</b><br>${output}<br><br>
    <b>Why:</b><br>${explanation}
    </div>
  `;
}

</script>

</body>
</html>
