<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Generator</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:30px; }
.wrapper { display:flex; gap:20px; max-width:1000px; margin:auto; }
.left,.right { background:#fff; padding:20px; border-radius:10px; flex:1; }
.right { max-width:300px; }
label { display:block; margin-top:10px; font-weight:bold; }
input,select { width:100%; padding:8px; margin-top:5px; }
button { margin-top:10px; padding:10px; width:100%; }
.card { background:#111; color:#0f0; padding:10px; margin-top:10px; border-radius:5px; }
.copy { background:#28a745; margin-top:5px; }
</style>

</head>
<body>

<h2>📧 Sales Email Generator</h2>

<div class="wrapper">

<div class="left">
<label>Situation</label>
<select id="situation">
  <option value="follow_up">Follow-up</option>
  <option value="first_contact">First Contact</option>
</select>

<label>Tone</label>
<select id="tone">
  <option value="polite">Polite</option>
  <option value="direct">Direct</option>
</select>

<label>Company</label>
<input id="company" placeholder="ABC Company">

<button onclick="generate()">Generate</button>

<div id="result"></div>
</div>

<div class="right">
<h3>Product</h3>
<select id="category">
  <option value="medical">Medical Device</option>
  <option value="cosmetic">Cosmetic</option>
  <option value="general">General</option>
</select>

<input id="product" placeholder="Product name">
</div>

</div>

<script>

const categoryMap = {
  medical: { term:"medical device", extra:"clinically validated" },
  cosmetic: { term:"cosmetic product", extra:"safe for daily use" },
  general: { term:"product", extra:"high quality" }
};

const templates = {
  follow_up: {
    polite: {
      subject: [
        "Gentle follow-up on {product}",
        "Checking in regarding {product}",
        "Any update on {product}?",
        "Following up on our discussion",
        "Quick follow-up"
      ],
      body: [
`Dear {company},

Just following up regarding {product}.
Looking forward to your feedback.

Best regards,`,

`Dear {company},

Hope you're well.
Any update on {product}?

Best regards,`,

`Dear {company},

Checking if you had time to review {product}.

Best regards,`,

`Dear {company},

Following up on our previous email.

Best regards,`,

`Dear {company},

Would appreciate your feedback on {product}.

Best regards,`
      ]
    },

    direct: {
      subject: [
        "Follow-up",
        "Update?",
        "Status check",
        "Feedback needed",
        "Quick check"
      ],
      body: [
`Hi {company},

Update on {product}?

Thanks.`,
`Hi {company},

Any feedback?

Thanks.`,
`Hi {company},

Please confirm status.

Thanks.`,
`Hi {company},

Following up.

Thanks.`,
`Hi {company},

Let me know.

Thanks.`
      ]
    }
  }
};

function randomPick(arr) {
  return arr[Math.floor(Math.random()*arr.length)];
}

function generate() {
  const situation = document.getElementById("situation").value;
  const tone = document.getElementById("tone").value;
  const company = document.getElementById("company").value || "your company";
  const product = document.getElementById("product").value || "product";

  const category = categoryMap[document.getElementById("category").value];

  const t = templates[situation][tone];

  let html = "";

  for(let i=0;i<5;i++){
    let subject = randomPick(t.subject);
    let body = randomPick(t.body);

    let text = ("Subject: "+subject+"\n\n"+body)
      .replace(/{company}/g,company)
      .replace(/{product}/g,product)
      .replace(/{category_term}/g,category.term)
      .replace(/{category_extra}/g,category.extra);

    html += `
      <div class="card">
        ${text.replace(/\n/g,"<br>")}
        <button class="copy" onclick="copyText(\`${text}\`)">Copy</button>
      </div>
    `;
  }

  document.getElementById("result").innerHTML = html;
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

</script>

</body>
</html>
